<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Crypto Guardian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 400px;
      background: #0f0f23;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    .header h1 {
      font-size: 18px;
      color: #00d4ff;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      color: #888;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #222;
    }
    .status-item {
      text-align: center;
    }
    .status-item .value {
      font-size: 20px;
      font-weight: 700;
      color: #00d4ff;
    }
    .status-item .label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
    }
    .section {
      padding: 16px 20px;
    }
    .section h2 {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .input-group input {
      flex: 1;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }
    .input-group input:focus {
      border-color: #00d4ff;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .result-card {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .result-card.danger { border-color: #ef4444; }
    .result-card.safe { border-color: #22c55e; }
    .result-card .score {
      font-size: 24px;
      font-weight: 700;
    }
    .result-card .findings {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
    }
    .finding-item {
      padding: 4px 0;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .finding-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .dot.critical { background: #ef4444; }
    .dot.high { background: #f59e0b; }
    .dot.medium { background: #eab308; }
    .dot.low { background: #22c55e; }
    .footer {
      padding: 12px 20px;
      text-align: center;
      border-top: 1px solid #222;
    }
    .footer a {
      color: #00d4ff;
      text-decoration: none;
      font-size: 12px;
    }
    #result { display: none; }
    .loading { text-align: center; padding: 20px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>&#x1F6E1;&#xFE0F; Crypto Guardian</h1>
    <p>AI-Powered Wallet Security</p>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <div class="value" id="blockedCount">0</div>
      <div class="label">Blocked</div>
    </div>
    <div class="status-item">
      <div class="value" id="scannedCount">0</div>
      <div class="label">Scanned</div>
    </div>
    <div class="status-item">
      <div class="value" id="toolCount">11</div>
      <div class="label">Tools</div>
    </div>
  </div>

  <div class="section">
    <h2>Quick Scan</h2>
    <div class="input-group">
      <input type="text" id="scanInput" placeholder="Address, URL, or paste suspicious text">
      <button class="btn btn-primary" id="scanBtn">Scan</button>
    </div>
  </div>

  <div class="section" id="result"></div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Open Full Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
